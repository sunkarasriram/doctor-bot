<!DOCTYPE html>
<html>
<head>
  <title>Doctor AI Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url("https://images.unsplash.com/Doctorbot.jpg.jpeg") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      height: 650px;
      background: rgba(255,255,255,0.95);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      background: #2e7d32;
      color: white;
      padding: 10px;
    }

    .doctor-img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .status {
      font-size: 12px;
      color: #c8e6c9;
    }

    /* CHAT */
    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      margin: 8px 0;
      animation: fadeIn 0.3s ease-in;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      margin: 5px;
    }

    .message {
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #c8e6c9;
      margin-left: auto;
    }

    .bot {
      background: #e3f2fd;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .typing {
      font-style: italic;
      color: gray;
      margin-left: 10px;
    }

    /* INPUT */
    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ccc;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      margin-left: 8px;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 16px;
    }

    .send-btn {
      background: #2e7d32;
      color: white;
    }

    .voice-btn {
      background: #0288d1;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" class="doctor-img">
    <div>
      <h3>Doctor AI</h3>
      <p class="status">Online</p>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="chat-box"></div>

  <!-- TYPING -->
  <div id="typing" class="typing"></div>

  <!-- INPUT -->
  <div class="input-area">
    <input type="text" id="msg" placeholder="Describe your symptoms...">
    <button class="voice-btn" onclick="startVoice()">🎤</button>
    <button class="send-btn" onclick="send()">➤</button>
  </div>

</div>

<script>

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let row = document.createElement("div");
  row.className = "msg-row";

  let avatar = document.createElement("img");
  avatar.className = "avatar";

  if(type === "bot"){
    avatar.src = "https://cdn-icons-png.flaticon.com/512/2785/2785544.png";
  } else {
    avatar.src = "https://cdn-icons-png.flaticon.com/512/847/847969.png";
  }

  let msg = document.createElement("div");
  msg.className = "message " + type;
  msg.innerText = text;

  if(type === "bot"){
    row.appendChild(avatar);
    row.appendChild(msg);
  } else {
    row.appendChild(msg);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  let msg = document.getElementById("msg").value;
  if(msg.trim() === "") return;

  addMessage(msg, "user");

  document.getElementById("typing").innerText = "Doctor AI is typing...";

  fetch("http://127.0.0.1:5000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: msg})
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("typing").innerText = "";
    addMessage(data.reply, "bot");
  });

  document.getElementById("msg").value = "";
}

/* VOICE INPUT */
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.start();

  recognition.onresult = function(event) {
    let voiceText = event.results[0][0].transcript;
    document.getElementById("msg").value = voiceText;
  };
}

/* ENTER KEY SUPPORT */
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    send();
  }
});

</script>

</body>
</html>
